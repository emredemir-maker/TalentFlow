# CI — runs on every PR and on pushes to main.
#
# Four parallel jobs:
#   - lint:  dep-drift, ESLint (baseline-locked), Prettier, tsc --noEmit
#   - test:  Vitest with coverage gate (50% on curated service slice)
#   - build: Vite production build
#   - e2e:   Playwright smoke tests against `vite preview` (no Firebase
#            secrets required — public-route smokes only)
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs when a branch is pushed to repeatedly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      # Dependency-drift guard. Catches the Phase 4b regression class:
      # a package added to root package.json that gets imported in
      # functions/ source but is missing from functions/package.json.
      # Cloud Build only installs functions/package.json, so the missing
      # dep crashes Cloud Run at startup with ERR_MODULE_NOT_FOUND. Cheap
      # check (~50ms) — no npm install needed beyond the one above.
      - name: Backend dependency drift check
        run: npm run check:deps
      # lint:ci enforces the baseline warning count via --max-warnings. Adding
      # warnings without removing equivalents elsewhere will fail this gate.
      - name: ESLint (baseline-locked)
        run: npm run lint:ci
      # Prettier check — fails if any committed file would be reformatted.
      # This relies on lint-staged having auto-formatted touched files locally
      # before commit.
      - name: Prettier check
        run: npm run format:check
      # TypeScript type check on .ts/.tsx files. With `allowJs: true` and
      # `checkJs: false` in tsconfig.json, .js files are accepted as inputs
      # but not type-checked, so this gate only validates the slice of the
      # codebase that has graduated to TS. Phase 4e migrates one module
      # (pii.ts) as a demo; future PRs add more.
      - name: TypeScript typecheck
        run: npm run typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      # Vitest with coverage — the gate is configured in vitest.config.js
      # (50% across statements/branches/functions/lines on the curated
      # service slice). Phase 4d adds Playwright E2E as a separate job.
      - name: Vitest (with coverage gate)
        run: npm run test:coverage
      # Upload the HTML coverage report so reviewers can drill into hot
      # spots without running the suite locally.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Vite build
        run: npm run build
        env:
          # Build runs without real Firebase keys — the bundle compiles fine
          # without them since Vite only warns on missing VITE_* vars.
          NODE_ENV: production
      - name: Bundle size budget check
        # Guards the gain from PR #35 (route-level lazy loading). Fails
        # the build if the main app chunk grows past the budget defined
        # in scripts/check-bundle-size.mjs.
        run: npm run check:bundle-size

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      # Cache the Playwright browser binaries — they're ~300MB and
      # downloading them every CI run dominates the job time. Keyed on
      # the @playwright/test version pinned in package-lock.json.
      - name: Get Playwright version
        id: pw
        run: |
          PW_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      # The build runs as part of the e2e job (rather than reusing the
      # build job's artifact) for simplicity. Adds ~25s but keeps the
      # workflow flat — no inter-job artifact passing.
      - name: Vite build
        run: npm run build
        env:
          NODE_ENV: production
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: 'true'
      # Always upload the HTML report + traces so debugging a flake
      # doesn't require rerunning locally.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  e2e-auth:
    name: E2E (Playwright authenticated)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Get Playwright version
        id: pw
        run: |
          PW_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      # The auth-suite config (playwright.config.auth.js) handles its
      # own build via `npm run build:e2e-auth` — that build picks up
      # `.env.e2e-auth` which sets VITE_E2E_MOCK_AUTH=true plus a fake
      # Firebase config. The mock-auth branch in AuthContext then
      # short-circuits before any real network call. No emulator,
      # no real secrets.
      - name: Run Playwright tests (authenticated suite)
        run: npm run test:e2e:auth
        env:
          CI: 'true'
      - name: Upload Playwright report (auth)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-auth
          path: playwright-report-auth/
          retention-days: 7
      - name: Upload Playwright traces (auth)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-auth
          path: test-results/
          retention-days: 7
