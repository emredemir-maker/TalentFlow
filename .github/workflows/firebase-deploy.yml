name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check required secrets
        run: |
          if [ -z "$EMAIL_USER" ] || [ -z "$EMAIL_PASS" ]; then
            echo "❌ EMAIL_USER veya EMAIL_PASS secret eksik!"
            exit 1
          fi
          echo "✅ Tüm gerekli secrets mevcut"
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

      - name: Install root dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: talentflow-84bb6.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: talentflow-84bb6
          VITE_FIREBASE_STORAGE_BUCKET: talentflow-84bb6.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "132883257197"
          VITE_FIREBASE_APP_ID: 1:132883257197:web:9c569a6c8fa52b0cfe6c64
          VITE_SERVER_URL: https://talentflow-84bb6.web.app
          VITE_APP_URL: https://talentflow-84bb6.web.app

      - name: Install Functions dependencies
        run: npm install
        working-directory: ./functions
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Create functions/.env.production
        run: |
          printf 'EMAIL_USER=%s\nEMAIL_PASS=%s\nVITE_GEMINI_API_KEY=%s\nVITE_FIREBASE_API_KEY=%s\n' \
            "$EMAIL_USER" \
            "$EMAIL_PASS" \
            "$VITE_GEMINI_API_KEY" \
            "$VITE_FIREBASE_API_KEY" \
            > functions/.env.production
          echo "✅ functions/.env.production oluşturuldu:"
          cat functions/.env.production | sed 's/=.*/=***/' 
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}

      - name: Authenticate to Google Cloud
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/gcp-sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json" >> $GITHUB_ENV

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,functions,firestore --project talentflow-84bb6
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa.json

      - name: Set Cloud Run env vars (guaranteed delivery)
        run: |
          gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json
          gcloud config set project talentflow-84bb6
          # Inject env vars. Use ^|^ delimiter to handle commas/spaces safely.
          # NOTE: Cloud Run service account stays as default (compute SA). The compute SA
          # has 'roles/datastore.user' granted manually via IAM console, so admin SDK
          # can read Firestore (api_keys doc, etc.) without needing to switch SA.
          gcloud run services update api \
            --region us-central1 \
            --update-env-vars "^|^EMAIL_USER=${EMAIL_USER}|EMAIL_PASS=${EMAIL_PASS}|VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}|VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}"
          echo "✅ Cloud Run env vars set"
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
