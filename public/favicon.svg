<svg width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ti-bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#061633"/>
      <stop offset="100%" stop-color="#0A1F4E"/>
    </linearGradient>
    <filter id="ti-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="ti-clip">
      <rect width="100" height="100" rx="18"/>
    </clipPath>
  </defs>

  <!-- Badge background -->
  <rect width="100" height="100" rx="18" fill="url(#ti-bg)"/>

  <g clip-path="url(#ti-clip)">
    <!-- Soft centre glow -->
    <circle cx="50" cy="45" r="30" fill="#06B6D4" fill-opacity="0.07"/>

    <!-- Outer ring arcs -->
    <path d="M 26,26 C 50,9  50,9  74,26" stroke="#38BDF8" stroke-width="2"   stroke-linecap="round" fill="none" stroke-opacity="0.65"/>
    <path d="M 74,26 C 90,45 90,45 74,64" stroke="#38BDF8" stroke-width="2"   stroke-linecap="round" fill="none" stroke-opacity="0.65"/>
    <path d="M 74,64 C 50,80 50,80 26,64" stroke="#38BDF8" stroke-width="2"   stroke-linecap="round" fill="none" stroke-opacity="0.65"/>
    <path d="M 26,64 C 10,45 10,45 26,26" stroke="#38BDF8" stroke-width="2"   stroke-linecap="round" fill="none" stroke-opacity="0.65"/>

    <!-- Inner swirl — S-curves (back pass) -->
    <path d="M 26,26 C 62,26 38,45 50,45" stroke="#67E8F9" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- Knockout where B crosses A -->
    <path d="M 74,26 C 38,26 62,45 50,45" stroke="#061633" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <!-- S-curve B on top -->
    <path d="M 74,26 C 38,26 62,64 26,64" stroke="#67E8F9" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <!-- S-curve A front portion -->
    <path d="M 50,45 C 62,45 38,64 74,64" stroke="#67E8F9" stroke-width="2.2" stroke-linecap="round" fill="none"/>

    <!-- Node glow halos -->
    <g filter="url(#ti-glow)">
      <circle cx="26" cy="26" r="5" fill="#06B6D4" fill-opacity="0.6"/>
      <circle cx="74" cy="26" r="5" fill="#06B6D4" fill-opacity="0.6"/>
      <circle cx="74" cy="64" r="5" fill="#06B6D4" fill-opacity="0.6"/>
      <circle cx="26" cy="64" r="5" fill="#06B6D4" fill-opacity="0.6"/>
    </g>

    <!-- Node circles -->
    <circle cx="26" cy="26" r="5.5" fill="#061633" stroke="#67E8F9" stroke-width="2.2"/>
    <circle cx="26" cy="26" r="2.2" fill="#A5F3FC"/>
    <circle cx="74" cy="26" r="5.5" fill="#061633" stroke="#67E8F9" stroke-width="2.2"/>
    <circle cx="74" cy="26" r="2.2" fill="#A5F3FC"/>
    <circle cx="74" cy="64" r="5.5" fill="#061633" stroke="#67E8F9" stroke-width="2.2"/>
    <circle cx="74" cy="64" r="2.2" fill="#A5F3FC"/>
    <circle cx="26" cy="64" r="5.5" fill="#061633" stroke="#67E8F9" stroke-width="2.2"/>
    <circle cx="26" cy="64" r="2.2" fill="#A5F3FC"/>

    <!-- 3 stars -->
    <polygon points="37,77 38,80 41,80 39,82 40,85 37,83 34,85 35,82 33,80 36,80" fill="#38BDF8" fill-opacity="0.7"/>
    <polygon points="50,77 51,80 54,80 52,82 53,85 50,83 47,85 48,82 46,80 49,80" fill="#38BDF8" fill-opacity="0.7"/>
    <polygon points="63,77 64,80 67,80 65,82 66,85 63,83 60,85 61,82 59,80 62,80" fill="#38BDF8" fill-opacity="0.7"/>
  </g>
</svg>
